name: Build mobile apps

on:
  workflow_dispatch:
  push:
    tags:
      - "mobile-v*"

permissions:
  contents: write

jobs:
  android:
    name: Android arm64
    runs-on: ubuntu-22.04
    env:
      NDK_VERSION: 28.2.13676358
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Android SDK and NDK
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0" "ndk;$NDK_VERSION"
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Prepare Android signing key
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-release.jks"
      - name: Build signed APK and AAB
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/android-release.jks
        run: npm run mobile:android:build
      - name: Build installable debug APK
        if: env.ANDROID_KEYSTORE_BASE64 == ''
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/${{ env.NDK_VERSION }}
        run: npm run mobile:android:build:debug

      - name: Upload Android packages
        uses: actions/upload-artifact@v4
        with:
          name: doomsday-gates-android-arm64
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error
      - name: Attach signed Android packages to release
        if: startsWith(github.ref, 'refs/tags/') && env.ANDROID_KEYSTORE_BASE64 != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/**/*.aab

  ios:
    name: iOS
    runs-on: macos-14
    env:
      APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Initialize iOS project
        # Tauri requires a team identifier while generating Xcode files even
        # for a no-sign simulator build. The placeholder is never used to sign.
        run: APPLE_DEVELOPMENT_TEAM="${APPLE_DEVELOPMENT_TEAM:-0000000000}" npm run mobile:ios:init
      - name: Import Apple distribution certificate
        if: env.IOS_CERTIFICATE_BASE64 != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      - name: Install provisioning profile
        if: env.IOS_PROVISIONING_PROFILE_BASE64 != ''
        run: |
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/DoomsdayGates.mobileprovision"
      - name: Build signed App Store IPA
        if: env.IOS_CERTIFICATE_BASE64 != '' && env.IOS_PROVISIONING_PROFILE_BASE64 != '' && env.APPLE_DEVELOPMENT_TEAM != ''
        run: npm run mobile:ios:build
      - name: Build unsigned simulator app
        if: env.IOS_CERTIFICATE_BASE64 == '' || env.IOS_PROVISIONING_PROFILE_BASE64 == '' || env.APPLE_DEVELOPMENT_TEAM == ''
        run: npm run mobile:ios:build:sim

      - name: Upload iOS packages
        uses: actions/upload-artifact@v4
        with:
          name: doomsday-gates-ios
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.app
          if-no-files-found: error
      - name: Attach signed IPA to release
        if: startsWith(github.ref, 'refs/tags/') && env.IOS_CERTIFICATE_BASE64 != '' && env.IOS_PROVISIONING_PROFILE_BASE64 != '' && env.APPLE_DEVELOPMENT_TEAM != ''
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/apple/build/**/*.ipa
